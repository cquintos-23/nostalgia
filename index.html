<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nostalgia Orb Builder</title>
<style>
  @import url('https://use.typekit.net/otl6ozb.css');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #19212E;
    --surface: #19212E;
    --border: rgba(255,255,255,0.06);
    --text: #AAAFB7;
    --text-dim: #959AA1;
    --accent: #7B9EDB;

    --happiness:  #FF9C67;
    --comfort:    #698A6C;
    --hope:       #FFE291;
    --melancholy: #B3BCD9;
    --longing:    #5154F0;
    --regret:     #474083;
    --sadness:    #2E497A;
    --discomfort: #315160;
    --confusion:  #9D3A4F;
    --missing:    #989FA4;
    --belonging:  #786872;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'articulat-cf', sans-serif;
    font-weight: 500;
    font-style: normal;
    font-size: 10px;
    letter-spacing: -0.04em;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    user-select: none;
  }

  .workspace {
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  .sidebar {
    width: 25vw;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 16px 14px;
    gap: 20px;
    overflow-y: auto;
  }

  .sidebar-section label {
    display: block;
    color: var(--text-dim);
    letter-spacing: -0.02em;
    font-size: 10px;
    font-family: 'articulat-cf', sans-serif;
    font-weight: 700;
    font-style: normal;
    margin-bottom: 10px;
  }

  .emotion-list {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }

  .emotion-btn {
    display: flex;
    align-items: center;
    gap: 9px;
    background: transparent;
    border: 1px solid transparent;
    padding: 5px 8px;
    border-radius: 3px;
    cursor: pointer;
    font-family: 'articulat-cf', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: var(--text-dim);
    text-align: left;
    transition: all 0.15s;
    width: 100%;
  }

  .emotion-btn:hover {
    color: var(--text);
    background: rgba(255,255,255,0.03);
  }

  .emotion-btn.active {
    border-color: rgba(255,255,255,0.15);
    color: #fff;
    background: rgba(255,255,255,0.05);
  }

  .emotion-dot {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    flex-shrink: 0;
    opacity: 0.85;
  }

  .emotion-btn.active .emotion-dot {
    opacity: 1;
    box-shadow: 0 0 6px currentColor;
  }

  .tools {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .tool-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'articulat-cf', sans-serif;
    font-size: 10px;
    padding: 7px 10px;
    text-align: left;
    cursor: pointer;
    border-radius: 3px;
    letter-spacing: -0.02em;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .tool-btn:hover {
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
  }

  .tool-btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }

  .tool-btn svg {
    width: 12px;
    height: 12px;
    flex-shrink: 0;
    opacity: 0.7;
  }

  .slider-wrap {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .slider-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }

  .slider-row span:first-child {
    color: var(--text-dim);
    font-size: 10px;
    min-width: 50px;
  }

  .slider-row span:last-child {
    color: var(--text);
    font-size: 10px;
    min-width: 24px;
    text-align: right;
  }

  input[type="range"] {
    -webkit-appearance: none;
    flex: 1;
    height: 2px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px;
    outline: none;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
  }

  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at center, #222b3a 0%, #19212E 70%);
  }

  #mesh-canvas {
    cursor: crosshair;
    display: block;
  }

  #mesh-canvas.mode-delete { cursor: not-allowed; }
  #mesh-canvas.mode-move   { cursor: grab; }
  #mesh-canvas.mode-move.dragging { cursor: grabbing; }

  .hint {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    color: var(--text-dim);
    font-size: 10px;
    letter-spacing: -0.02em;
    pointer-events: none;
    transition: opacity 0.4s;
  }

  .checkbox-row { display: none; }

  /* ── Emotion filter overlay ── */
  #emotion-overlay {
    position: absolute;
    pointer-events: none;
    opacity: 0;
    mix-blend-mode: screen;
    transition: opacity 0.5s ease;
    transform: translate(-50%, -50%);
    left: 50%;
    top: 50%;
  }

  #emotion-overlay.visible {
    opacity: 0.07;
  }

  /* ── Filter dropdown ── */
  .filter-select-wrap {
    position: relative;
  }

  .filter-select-wrap select {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'articulat-cf', sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: -0.02em;
    padding: 6px 24px 6px 8px;
    border-radius: 3px;
    cursor: pointer;
    outline: none;
    transition: all 0.15s;
  }

  .filter-select-wrap select:hover,
  .filter-select-wrap select:focus {
    border-color: rgba(255,255,255,0.15);
    color: var(--text);
  }

  .filter-select-wrap::after {
    content: '▾';
    position: absolute;
    right: 8px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 10px;
    pointer-events: none;
  }

  .filter-clear {
    margin-top: 4px;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-family: 'articulat-cf', sans-serif;
    font-size: 9px;
    letter-spacing: -0.02em;
    cursor: pointer;
    padding: 2px 0;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 0.15s;
  }

  .filter-clear:hover { color: var(--text); }
  .filter-clear.hidden { visibility: hidden; }

  .filename-input {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'articulat-cf', sans-serif;
    font-size: 10px;
    letter-spacing: -0.02em;
    padding: 6px 8px;
    border-radius: 3px;
    outline: none;
    transition: border-color 0.15s;
    margin-bottom: 6px;
  }
  .filename-input:focus {
    border-color: rgba(255,255,255,0.2);
  }
  .filename-input::placeholder {
    color: var(--text-dim);
  }

  /* ── View toggle ── */
  .view-toggle {
    position: fixed;
    top: 14px;
    right: 18px;
    z-index: 100;
    display: flex;
    gap: 6px;
  }
  .view-toggle button {
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'articulat-cf', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: -0.02em;
    padding: 6px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .view-toggle button:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
  .view-toggle button.active { color: #fff; border-color: rgba(255,255,255,0.3); background: rgba(255,255,255,0.08); }

  /* ── Metadata fields ── */
  .meta-select {
    width: 100%;
    appearance: none;
    -webkit-appearance: none;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'articulat-cf', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: -0.02em;
    padding: 6px 24px 6px 8px;
    border-radius: 3px;
    cursor: pointer;
    outline: none;
    transition: all 0.15s;
  }
  .meta-select:hover, .meta-select:focus { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .meta-select-wrap { position: relative; margin-bottom: 6px; }
  .meta-select-wrap::after {
    content: '▾';
    position: absolute;
    right: 8px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 10px;
    pointer-events: none;
  }
  .meta-textarea {
    width: 100%;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'articulat-cf', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: -0.02em;
    padding: 6px 8px;
    border-radius: 3px;
    outline: none;
    resize: vertical;
    min-height: 72px;
    transition: border-color 0.15s;
    line-height: 1.5;
  }
  .meta-textarea:focus { border-color: rgba(255,255,255,0.2); }
  .meta-textarea::placeholder { color: var(--text-dim); }
  .char-count {
    text-align: right;
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 3px;
    letter-spacing: -0.02em;
  }

  /* ── Add to database button ── */
  .add-db-btn {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--text);
    font-family: 'articulat-cf', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: -0.02em;
    padding: 9px 12px;
    border-radius: 3px;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .add-db-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); color: #fff; }
  .add-db-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── Toast ── */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(255,255,255,0.15);
    color: #fff;
    font-family: 'articulat-cf', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: -0.02em;
    padding: 8px 16px;
    border-radius: 4px;
    opacity: 0;
    transition: all 0.3s;
    pointer-events: none;
    z-index: 200;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ── Gallery view ── */
  #gallery-view {
    display: none;
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
    background: #19212E;
    cursor: grab;
  }
  #gallery-view.active { display: block; }
  #gallery-view.panning { cursor: grabbing; }

  /* grain overlay on gallery */
  #gallery-view::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    opacity: 0.18;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
    background-size: 200px 200px;
  }

  /* pan/zoom container inside gallery */
  #gallery-stage {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    transform-origin: 0 0;
    will-change: transform;
  }

  .gallery-filters {
    position: absolute;
    top: 14px;
    left: 18px;
    z-index: 10;
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .gallery-filters select {
    appearance: none;
    -webkit-appearance: none;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'articulat-cf', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: -0.02em;
    padding: 5px 22px 5px 8px;
    border-radius: 3px;
    cursor: pointer;
    outline: none;
    transition: all 0.15s;
    background-image: none;
  }
  .gallery-filters select:hover { border-color: rgba(255,255,255,0.15); color: var(--text); }
  .gallery-filter-wrap { position: relative; }
  .gallery-filter-wrap::after {
    content: '▾';
    position: absolute;
    right: 7px; top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    font-size: 9px;
    pointer-events: none;
  }
  .gallery-count {
    font-family: 'articulat-cf', sans-serif;
    font-size: 9px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: -0.02em;
    padding: 0 4px;
  }

  /* ── Orb in gallery ── */
  .gallery-orb {
    position: absolute;
    cursor: pointer;
    transition: filter 0.3s;
  }
  .gallery-orb img {
    display: block;
    border-radius: 50%;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .gallery-orb:hover { filter: drop-shadow(0 0 14px rgba(255,255,255,0.35)); }

  /* ── Tooltip card ── */
  .orb-tooltip {
    position: fixed;
    background: rgba(20,26,36,0.95);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 10px 12px;
    max-width: 220px;
    pointer-events: none;
    z-index: 50;
    opacity: 0;
    transition: opacity 0.2s;
    font-family: 'articulat-cf', sans-serif;
    letter-spacing: -0.02em;
  }
  .orb-tooltip.visible { opacity: 1; }
  .orb-tooltip .tt-place {
    font-size: 10px;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 3px;
  }
  .orb-tooltip .tt-year {
    font-size: 9px;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .orb-tooltip .tt-desc {
    font-size: 10px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.5;
  }
  #gallery-canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
</style>
</head>
<body>

<div class="view-toggle">
  <button id="btn-builder" class="active" onclick="switchView('builder')">builder</button>
  <button id="btn-gallery" onclick="switchView('gallery')">nostalgia database</button>
</div>

<div id="gallery-view">
  <div id="gallery-stage"></div>
  <div class="gallery-filters">
    <div class="gallery-filter-wrap">
      <select id="gf-year-min" onchange="applyGalleryFilters()">
        <option value="">born: any</option>
      </select>
    </div>
    <span style="color:var(--text-dim);font-size:10px;">–</span>
    <div class="gallery-filter-wrap">
      <select id="gf-year-max" onchange="applyGalleryFilters()">
        <option value="">any</option>
      </select>
    </div>
    <div class="gallery-filter-wrap">
      <select id="gf-place" onchange="applyGalleryFilters()">
        <option value="">place: all</option>
        <option value="entertainment venue/arena">entertainment venue/arena</option>
        <option value="a home">a home</option>
        <option value="a workplace">a workplace</option>
        <option value="dining establishment">dining establishment</option>
        <option value="an urban area">an urban area</option>
        <option value="suburban area">suburban area</option>
        <option value="a rural area">a rural area</option>
        <option value="a mountain">a mountain</option>
        <option value="a forest">a forest</option>
        <option value="a body of water">a body of water</option>
        <option value="other built structure">other built structure</option>
        <option value="other natural landscape">other natural landscape</option>
      </select>
    </div>
    <span class="gallery-count" id="gallery-count"></span>
  </div>
  <div class="orb-tooltip" id="orb-tooltip"></div>
  <div style="position:absolute; bottom:16px; left:18px; font-size:10px; opacity:0.35; letter-spacing:0.01em; pointer-events:none; color:var(--text-dim);">zoom and move around to explore nostalgia</div>
</div>

<div class="workspace" id="builder-view">

  <div class="sidebar">

    <div class="sidebar-section">
      <label>memory metadata (optional)</label>
      <div class="meta-select-wrap">
        <select id="meta-year" class="meta-select">
          <option value="">year born</option>
        </select>
      </div>
      <div class="meta-select-wrap">
        <select id="meta-place" class="meta-select">
          <option value="">place type</option>
          <option value="entertainment venue/arena">entertainment venue/arena</option>
          <option value="a home">a home</option>
          <option value="a workplace">a workplace</option>
          <option value="dining establishment">dining establishment</option>
          <option value="an urban area">an urban area</option>
          <option value="suburban area">suburban area</option>
          <option value="a rural area">a rural area</option>
          <option value="a mountain">a mountain</option>
          <option value="a forest">a forest</option>
          <option value="a body of water">a body of water</option>
          <option value="other built structure">other built structure</option>
          <option value="other natural landscape">other natural landscape</option>
        </select>
      </div>
      <textarea id="meta-desc" class="meta-textarea" placeholder="describe this memory…" maxlength="400" oninput="updateCharCount()"></textarea>
      <div class="char-count" id="char-count">0 / 400</div>
    </div>

    <div class="sidebar-section">
      <label>emotion</label>
      <div class="emotion-list" id="emotion-list"></div>
    </div>

    <div class="sidebar-section">
      <label>memory</label>
      <div class="slider-wrap">
        <div class="slider-row">
          <span>intensity</span>
          <input type="range" id="sl-power" min="1" max="8" step="0.1" value="5">
          <span id="lbl-power">5.0</span>
        </div>
        <div class="slider-row">
          <span>unease</span>
          <input type="range" id="sl-noise" min="0" max="200" step="1" value="0">
          <span id="lbl-noise">0</span>
        </div>
        <div class="slider-row">
          <span>haziness</span>
          <input type="range" id="sl-blur" min="0" max="40" step="1" value="0">
          <span id="lbl-blur">0</span>
        </div>
        <div class="slider-row">
          <span>presence</span>
          <input type="range" id="sl-alpha" min="10" max="100" step="1" value="100">
          <span id="lbl-alpha">100%</span>
        </div>
      </div>
    </div>

    <div class="sidebar-section">
      <label>which emotion is most central to your experience of nostalgia?</label>
      <div class="filter-select-wrap">
        <select id="filter-select" onchange="setEmotionFilter(this.value)">
          <option value="">— none —</option>
          <option value="happiness">happiness</option>
          <option value="comfort">comfort</option>
          <option value="hope">hope</option>
          <option value="melancholy">melancholy</option>
          <option value="longing">longing</option>
          <option value="regret">regret</option>
          <option value="sadness">sadness</option>
          <option value="discomfort">discomfort</option>
          <option value="confusion">confusion</option>
          <option value="missing">missing</option>
          <option value="belonging">belonging</option>
        </select>
      </div>
      <button class="filter-clear hidden" id="filter-clear" onclick="clearFilter()">clear filter</button>
    </div>

    <div class="sidebar-section">
      <label>actions</label>
      <div class="tools">
        <button class="tool-btn" onclick="clearAll()">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 2L10 10M10 2L2 10"/></svg>
          clear all
        </button>
        <button class="add-db-btn" id="add-db-btn" onclick="addToDatabase()">add to nostalgia database</button>
        <input type="text" class="filename-input" id="filename-input" placeholder="name your file…" />
        <button class="tool-btn" onclick="exportPNG()">
          <svg viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M6 1v7M3 5l3 3 3-3M1 9v2h10V9"/></svg>
          export png
        </button>
      </div>
    </div>

  </div>

  <div class="canvas-wrap">
    <canvas id="mesh-canvas"></canvas>
    <img id="emotion-overlay" src="" alt="" />
    <div class="hint" id="hint">click anywhere inside the circle to visualize your memory</div>
  </div>

</div>

<script>
// ── Emotion palette ────────────────────────────────────────────────────────
const PALETTE = [
  { name: 'happiness',  hex: '#FF9C67' },
  { name: 'comfort',    hex: '#698A6C' },
  { name: 'hope',       hex: '#FFE291' },
  { name: 'melancholy', hex: '#B3BCD9' },
  { name: 'longing',    hex: '#5154F0' },
  { name: 'regret',     hex: '#474083' },
  { name: 'sadness',    hex: '#2E497A' },
  { name: 'discomfort', hex: '#315160' },
  { name: 'confusion',  hex: '#9D3A4F' },
  { name: 'missing',    hex: '#989FA4' },
  { name: 'belonging',  hex: '#786872' },
];

// ── State ──────────────────────────────────────────────────────────────────
let points = [];
let mode = 'add';
let activeColor = '#E98347';
let dragIdx = -1;
let dragOffX = 0, dragOffY = 0;
let needsRedraw = true;
let frameId = null;
let isExporting = false;

// ── Canvas setup ───────────────────────────────────────────────────────────
const canvas = document.getElementById('mesh-canvas');
const ctx = canvas.getContext('2d');

let W, H, CX, CY, RADIUS;

function resize() {
  const wrap = canvas.parentElement;
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  const size = Math.min(W, H) * 0.82;
  canvas.width  = W;
  canvas.height = H;
  CX = W / 2;
  CY = H / 2;
  RADIUS = size / 2;
  needsRedraw = true;

  // keep overlay sized to match the orb
  const overlay = document.getElementById('emotion-overlay');
  overlay.style.width  = size + 'px';
  overlay.style.height = size + 'px';
}

window.addEventListener('resize', resize);

const slPower = document.getElementById('sl-power');

// ── Noise (value noise, smooth) ────────────────────────────────────────────
function fade(t) { return t * t * t * (t * (t * 6 - 15) + 10); }
function lerp(a, b, t) { return a + t * (b - a); }

const PERM = new Uint8Array(512);
(function seedPerm() {
  const p = Array.from({length: 256}, (_, i) => i);
  for (let i = 255; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [p[i], p[j]] = [p[j], p[i]];
  }
  for (let i = 0; i < 512; i++) PERM[i] = p[i & 255];
})();

function grad(hash, x, y) {
  const h = hash & 3;
  const u = h < 2 ? x : y;
  const v = h < 2 ? y : x;
  return ((h & 1) ? -u : u) + ((h & 2) ? -v : v);
}

function noise2(x, y) {
  const xi = Math.floor(x) & 255, yi = Math.floor(y) & 255;
  const xf = x - Math.floor(x), yf = y - Math.floor(y);
  const u = fade(xf), v = fade(yf);
  const aa = PERM[PERM[xi]   + yi],   ab = PERM[PERM[xi]   + yi+1];
  const ba = PERM[PERM[xi+1] + yi],   bb = PERM[PERM[xi+1] + yi+1];
  return lerp(
    lerp(grad(aa, xf,   yf),   grad(ba, xf-1, yf),   u),
    lerp(grad(ab, xf,   yf-1), grad(bb, xf-1, yf-1), u),
    v
  );
}

// multi-octave fbm for richer, chunkier displacement
function fbm(x, y) {
  return noise2(x, y)        * 0.5
       + noise2(x*2, y*2)    * 0.3
       + noise2(x*4, y*4)    * 0.15
       + noise2(x*0.5, y*0.5)* 0.05;
}


// ── Hex → RGB ──────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return [r, g, b];
}

// ── IDW interpolation (pixel buffer) ──────────────────────────────────────
function buildMesh() {
  if (points.length === 0) return null;
  const power    = parseFloat(slPower.value);
  const driftAmt = parseInt(slNoise.value);
  const grainAmt = 38; // always-on baked grain like the reference image
  const buf  = ctx.createImageData(W, H);
  const data = buf.data;

  for (let py = 0; py < H; py++) {
    for (let px = 0; px < W; px++) {
      const dx = px - CX, dy = py - CY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      // alpha: fade to 0 at circle edge with soft feather, no hard clip
      const feather = RADIUS * 0.06;
      const alpha_px = dist < RADIUS - feather
        ? 255
        : dist > RADIUS ? 0
        : Math.round(255 * (1 - (dist - (RADIUS - feather)) / feather));
      if (alpha_px === 0) continue;

      // drift: large-scale domain warp using coarse fbm
      let spx = px, spy = py;
      if (driftAmt > 0) {
        const s = 0.0012; // coarser = bigger blobs
        spx = px + fbm(px * s,       py * s + 100) * driftAmt;
        spy = py + fbm(px * s + 200, py * s + 300) * driftAmt;
      }

      let wSum = 0, R = 0, G = 0, B = 0, exactHit = -1;
      for (let i = 0; i < points.length; i++) {
        const d = Math.hypot(spx - points[i].x, spy - points[i].y);
        if (d < 0.5) { exactHit = i; break; }
        const w = 1 / Math.pow(d, power);
        wSum += w;
        R += w * points[i].r;
        G += w * points[i].g;
        B += w * points[i].b;
      }

      let fr, fg, fb;
      if (exactHit >= 0) {
        fr = points[exactHit].r;
        fg = points[exactHit].g;
        fb = points[exactHit].b;
      } else {
        fr = R / wSum;
        fg = G / wSum;
        fb = B / wSum;
      }

      // bake grain scaled to unease amount
      const grainStrength = (driftAmt / 200) * grainAmt;
      const g = grainStrength > 0 ? (Math.random() - 0.5) * grainStrength : 0;
      const idx = (py * W + px) * 4;
      data[idx]   = Math.min(255, Math.max(0, fr + g));
      data[idx+1] = Math.min(255, Math.max(0, fg + g));
      data[idx+2] = Math.min(255, Math.max(0, fb + g));
      data[idx+3] = alpha_px;
    }
  }
  return buf;
}

// ── Draw loop ──────────────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, W, H);

  const useMask  = true;
  const showPts  = false;
  const useGrain = false;
  const alpha    = parseFloat(slAlpha.value) / 100;
  const blur     = parseInt(slBlur.value);

  // background — skipped during export so PNG has transparent bg outside circle
  if (!isExporting) {
    ctx.fillStyle = '#19212E';
    ctx.fillRect(0, 0, W, H);
  }

  // circle outline
  ctx.save();
  ctx.beginPath();
  ctx.arc(CX, CY, RADIUS, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.restore();

  if (points.length > 0) {
    // offscreen — transparent bg so circle edge bleeds naturally
    const off = document.createElement('canvas');
    off.width = W; off.height = H;
    const oCtx = off.getContext('2d');

    const buf = buildMesh();
    if (buf) {
      oCtx.putImageData(buf, 0, 0);

      // haziness blur
      let source = off;
      if (blur > 0) {
        const off2 = document.createElement('canvas');
        off2.width = W; off2.height = H;
        const o2 = off2.getContext('2d');
        o2.filter = `blur(${blur}px)`;
        o2.drawImage(off, 0, 0);
        source = off2;
      }

      ctx.globalAlpha = alpha;
      ctx.drawImage(source, 0, 0);
      ctx.globalAlpha = 1;
    }
  }

  // draw points
  if (showPts) {
    points.forEach((p, i) => {
      const isHot = i === dragIdx;
      ctx.save();
      ctx.beginPath();
      ctx.arc(p.x, p.y, isHot ? 8 : 6, 0, Math.PI * 2);
      ctx.fillStyle = p.hex;
      ctx.shadowColor = p.hex;
      ctx.shadowBlur = isHot ? 20 : 10;
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.restore();
    });
  }

  needsRedraw = false;
}

function loop() {
  if (needsRedraw) draw();
  frameId = requestAnimationFrame(loop);
}
loop();

// ── Helpers ────────────────────────────────────────────────────────────────
function insideCircle(x, y) {
  return Math.hypot(x - CX, y - CY) <= RADIUS;
}

function nearestPoint(x, y, threshold = 16) {
  let best = -1, bestD = threshold;
  points.forEach((p, i) => {
    const d = Math.hypot(x - p.x, y - p.y);
    if (d < bestD) { bestD = d; best = i; }
  });
  return best;
}

function hideHint() {
  document.getElementById('hint').style.opacity = '0';
}

// ── Mouse ──────────────────────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  if (mode === 'add') {
    if (!insideCircle(mx, my)) return;
    const [r, g, b] = hexToRgb(activeColor);
    points.push({ x: mx, y: my, hex: activeColor, r, g, b });
    hideHint();
    needsRedraw = true;
  }

  if (mode === 'delete') {
    const idx = nearestPoint(mx, my);
    if (idx >= 0) { points.splice(idx, 1); needsRedraw = true; }
  }

  if (mode === 'move') {
    const idx = nearestPoint(mx, my);
    if (idx >= 0) {
      dragIdx = idx;
      dragOffX = mx - points[idx].x;
      dragOffY = my - points[idx].y;
      canvas.classList.add('dragging');
    }
  }
});

canvas.addEventListener('mousemove', e => {
  if (mode !== 'move' || dragIdx < 0) return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left - dragOffX;
  const my = e.clientY - rect.top  - dragOffY;
  points[dragIdx].x = mx;
  points[dragIdx].y = my;
  needsRedraw = true;
});

canvas.addEventListener('mouseup', () => {
  dragIdx = -1;
  canvas.classList.remove('dragging');
});

canvas.addEventListener('mouseleave', () => {
  dragIdx = -1;
  canvas.classList.remove('dragging');
});

// ── Touch ──────────────────────────────────────────────────────────────────
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  const mx = t.clientX - rect.left;
  const my = t.clientY - rect.top;

  if (mode === 'add' && insideCircle(mx, my)) {
    const [r, g, b] = hexToRgb(activeColor);
    points.push({ x: mx, y: my, hex: activeColor, r, g, b });
    hideHint();
    needsRedraw = true;
  }
  if (mode === 'move') {
    const idx = nearestPoint(mx, my, 24);
    if (idx >= 0) {
      dragIdx = idx;
      dragOffX = mx - points[idx].x;
      dragOffY = my - points[idx].y;
    }
  }
  if (mode === 'delete') {
    const idx = nearestPoint(mx, my, 24);
    if (idx >= 0) { points.splice(idx, 1); needsRedraw = true; }
  }
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (dragIdx < 0) return;
  const rect = canvas.getBoundingClientRect();
  const t = e.touches[0];
  points[dragIdx].x = t.clientX - rect.left - dragOffX;
  points[dragIdx].y = t.clientY - rect.top  - dragOffY;
  needsRedraw = true;
}, { passive: false });

canvas.addEventListener('touchend', () => { dragIdx = -1; });

// ── Mode ───────────────────────────────────────────────────────────────────
function setMode(m) {
  mode = m;
  canvas.className = '';
  if (m === 'delete') canvas.classList.add('mode-delete');
  if (m === 'move')   canvas.classList.add('mode-move');
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
}

function clearAll() {
  points = [];
  document.getElementById('hint').style.opacity = '1';
  needsRedraw = true;
}

function exportPNG() {
  // redraw once onto a fresh transparent canvas
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width  = W;
  exportCanvas.height = H;
  const eCtx = exportCanvas.getContext('2d');

  // temporarily redirect ctx to export canvas and draw without bg fill
  isExporting = true;
  draw();
  isExporting = false;

  // copy the transparent render
  eCtx.drawImage(canvas, 0, 0);

  // restore display render
  needsRedraw = true;

  // composite the overlay if active, clipped to the circle
  const overlay = document.getElementById('emotion-overlay');
  if (overlay.src && overlay.classList.contains('visible')) {
    eCtx.save();
    eCtx.beginPath();
    eCtx.arc(CX, CY, RADIUS, 0, Math.PI * 2);
    eCtx.clip();
    eCtx.globalAlpha = 0.07;
    eCtx.globalCompositeOperation = 'screen';
    eCtx.drawImage(overlay, CX - RADIUS, CY - RADIUS, RADIUS * 2, RADIUS * 2);
    eCtx.restore();
  }

  const filenameInput = document.getElementById('filename-input');
  const rawName = filenameInput ? filenameInput.value.trim() : '';
  const filename = rawName ? rawName.replace(/\.png$/i, '') + '.png' : 'emotional-field.png';

  const link = document.createElement('a');
  link.download = filename;
  link.href = eCtx.canvas.toDataURL('image/png');
  link.click();
}

function setEmotionFilter(emotion) {
  const overlay   = document.getElementById('emotion-overlay');
  const clearBtn  = document.getElementById('filter-clear');

  if (!emotion) {
    overlay.classList.remove('visible');
    clearBtn.classList.add('hidden');
    overlay.src = '';
    return;
  }

  overlay.src = FILTER_PNGS[emotion];
  overlay.classList.add('visible');
  clearBtn.classList.remove('hidden');
}

function clearFilter() {
  document.getElementById('filter-select').value = '';
  setEmotionFilter('');
}

// ── Populate year dropdowns ────────────────────────────────────────────────
(function populateYears() {
  const metaYear = document.getElementById('meta-year');
  const gfMin = document.getElementById('gf-year-min');
  const gfMax = document.getElementById('gf-year-max');
  for (let y = 1940; y <= 2010; y++) {
    const o1 = document.createElement('option');
    o1.value = y; o1.textContent = y;
    metaYear.appendChild(o1);
    const o2 = document.createElement('option');
    o2.value = y; o2.textContent = y;
    gfMin.appendChild(o2);
    const o3 = document.createElement('option');
    o3.value = y; o3.textContent = y;
    gfMax.appendChild(o3);
  }
})();

function updateCharCount() {
  const ta = document.getElementById('meta-desc');

}

// ── View switching ─────────────────────────────────────────────────────────
let currentView = 'builder';
let galleryInited = false;
function switchView(view) {
  currentView = view;
  document.getElementById('builder-view').style.display = view === 'builder' ? 'flex' : 'none';
  document.getElementById('gallery-view').classList.toggle('active', view === 'gallery');
  document.getElementById('btn-builder').classList.toggle('active', view === 'builder');
  document.getElementById('btn-gallery').classList.toggle('active', view === 'gallery');
  if (view === 'gallery') {
    if (!galleryInited) { initGalleryInteraction(); galleryInited = true; }
    loadAndRenderGallery();
  }
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── Capture orb as data URL ────────────────────────────────────────────────
function captureOrbDataURL() {
  const exportCanvas = document.createElement('canvas');
  exportCanvas.width = W;
  exportCanvas.height = H;
  const eCtx = exportCanvas.getContext('2d');

  isExporting = true;
  draw();
  isExporting = false;
  eCtx.drawImage(canvas, 0, 0);
  needsRedraw = true;

  const overlay = document.getElementById('emotion-overlay');
  if (overlay.src && overlay.classList.contains('visible')) {
    eCtx.save();
    eCtx.beginPath();
    eCtx.arc(CX, CY, RADIUS, 0, Math.PI * 2);
    eCtx.clip();
    eCtx.globalAlpha = 0.07;
    eCtx.globalCompositeOperation = 'screen';
    eCtx.drawImage(overlay, CX - RADIUS, CY - RADIUS, RADIUS * 2, RADIUS * 2);
    eCtx.restore();
  }

  // Crop to just the orb bounding box
  const cropSize = Math.round(RADIUS * 2 + 4);
  const cropX = Math.round(CX - RADIUS - 2);
  const cropY = Math.round(CY - RADIUS - 2);
  const cropped = document.createElement('canvas');
  cropped.width = cropSize;
  cropped.height = cropSize;
  cropped.getContext('2d').drawImage(exportCanvas, cropX, cropY, cropSize, cropSize, 0, 0, cropSize, cropSize);
  return cropped.toDataURL('image/png');
}

// ── Cloudinary config ──────────────────────────────────────────────────────
const CLOUDINARY_CLOUD  = 'djz5xvmvc';
const CLOUDINARY_PRESET = 'nostalgia_orb';

async function uploadToCloudinary(dataURL) {
  const formData = new FormData();
  formData.append('file', dataURL);
  formData.append('upload_preset', CLOUDINARY_PRESET);
  const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, {
    method: 'POST',
    body: formData
  });
  const json = await res.json();
  if (!json.secure_url) throw new Error('Cloudinary upload failed');
  return json.secure_url;
}

async function fetchOrbs() {
  const res = await fetch(`${JSONBIN_BASE}/b/${JSONBIN_BIN_ID}/latest`, {
    headers: { 'X-Master-Key': JSONBIN_API_KEY }

async function saveOrbs(orbs) {
  await fetch(`${JSONBIN_BASE}/b/${JSONBIN_BIN_ID}`, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'X-Master-Key': JSONBIN_API_KEY
    },
    body: JSON.stringify(orbs)
  });
}

// ── Add to database ────────────────────────────────────────────────────────
async function addToDatabase() {
  if (points.length === 0) { showToast('add some color points to your memory first'); return; }

  const btn = document.getElementById('add-db-btn');
  btn.disabled = true;
  btn.textContent = 'uploading image…';

  const emotion = document.getElementById('filter-select').value || null;
  const year    = document.getElementById('meta-year').value || null;
  const place   = document.getElementById('meta-place').value || null;
  const desc    = document.getElementById('meta-desc').value.trim() || null;
  const id      = 'orb_' + Date.now() + '_' + Math.random().toString(36).slice(2,7);

  try {
    const dataURL = captureOrbDataURL();
    btn.textContent = 'saving…';
    const imgUrl = await uploadToCloudinary(dataURL);
    const entry  = { id, imgUrl, emotion, year, place, desc, ts: Date.now() };
    const orbs   = await fetchOrbs();
    orbs.push(entry);
    await saveOrbs(orbs);
    showToast('memory added to the nostalgia database ✦');
    btn.textContent = 'added ✦';
  } catch(e) {
    showToast('error saving — try again');
    btn.textContent = 'add to nostalgia database';
    btn.disabled = false;
    return;
  }
  setTimeout(() => { btn.disabled = false; btn.textContent = 'add to nostalgia database'; }, 3000);
}

// ── Gallery state ──────────────────────────────────────────────────────────
let allOrbs = [];
let filteredOrbs = [];
let orbElements = [];
let animFrame;

function applyGalleryFilters() {
  const yearMin = parseInt(document.getElementById('gf-year-min').value) || 0;
  const yearMax = parseInt(document.getElementById('gf-year-max').value) || 9999;
  const place = document.getElementById('gf-place').value;

  filteredOrbs = allOrbs.filter(o => {
    const y = parseInt(o.year) || 0;
    if (yearMin && y < yearMin) return false;
    if (yearMax < 9999 && y > yearMax) return false;
    if (place && o.place !== place) return false;
    return true;
  });

  document.getElementById('gallery-count').textContent =
    filteredOrbs.length + (filteredOrbs.length !== 1 ? ' memories' : ' memory');
  renderOrbElements();
}

function renderOrbElements() {
  const stage = document.getElementById('gallery-stage');
  orbElements.forEach(el => el.remove());
  orbElements = [];
  if (animFrame) cancelAnimationFrame(animFrame);

  const container = document.getElementById('gallery-view');
  const GW = container.clientWidth;
  const GH = container.clientHeight;
  const SIZE = Math.min(GW, GH) * 0.13;

  if (filteredOrbs.length === 0) {
    const msg = document.createElement('div');
    msg.style.cssText = 'position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--text-dim);font-size:11px;letter-spacing:-0.02em;font-family:articulat-cf,sans-serif;pointer-events:none;z-index:10;';
    msg.textContent = 'no memories yet — build one and add it';
    container.appendChild(msg);
    orbElements.push(msg);
    return;
  }

  const spread = Math.max(1, Math.ceil(Math.sqrt(filteredOrbs.length)));
  const virtualW = Math.max(GW * 1.8, GW + spread * SIZE * 1.6);
  const virtualH = Math.max(GH * 1.8, GH + spread * SIZE * 1.6);

  filteredOrbs.forEach((orb) => {
    const el = document.createElement('div');
    el.className = 'gallery-orb';
    el.style.width = SIZE + 'px';
    el.style.height = SIZE + 'px';

    const img = document.createElement('img');
    img.src = orb.imgUrl;
    el.appendChild(img);

    const margin = SIZE * 0.7;
    const x = margin + Math.random() * (virtualW - SIZE - margin * 2);
    const y = margin + Math.random() * (virtualH - SIZE - margin * 2);
    el.style.left = x + 'px';
    el.style.top  = y + 'px';

    const floatAmp    = 4 + Math.random() * 6;
    const floatSpeed  = 0.0004 + Math.random() * 0.0003;
    const floatOffset = Math.random() * Math.PI * 2;

    el.addEventListener('mouseenter', (e) => showOrbTooltip(orb, e));
    el.addEventListener('mousemove',  (e) => moveOrbTooltip(e));
    el.addEventListener('mouseleave', hideOrbTooltip);

    stage.appendChild(el);
    orbElements.push(el);
    el._anim = { floatAmp, floatSpeed, floatOffset };
  });

  function animateOrbs(t) {
    orbElements.forEach(el => {
      if (!el._anim) return;
      const a = el._anim;
      const dx = Math.sin(t * a.floatSpeed + a.floatOffset) * a.floatAmp;
      const dy = Math.cos(t * a.floatSpeed * 0.7 + a.floatOffset + 1) * a.floatAmp * 0.6;
      el.style.transform = `translate(${dx}px, ${dy}px)`;
    });
    animFrame = requestAnimationFrame(animateOrbs);
  }
  animFrame = requestAnimationFrame(animateOrbs);
}

// ── Pan / Zoom ─────────────────────────────────────────────────────────────────────────────
let panX = 0, panY = 0, scale = 1;
let isPanning = false, panStartX = 0, panStartY = 0, panOriginX = 0, panOriginY = 0;

function applyStageTransform() {
  const stage = document.getElementById('gallery-stage');
  if (stage) stage.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
}

function initGalleryInteraction() {
  const gv = document.getElementById('gallery-view');
  panX = 0; panY = 0; scale = 1;
  applyStageTransform();

  gv.addEventListener('mousedown', (e) => {
    if (e.target.closest('.gallery-orb') || e.target.closest('.gallery-filters')) return;
    isPanning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panOriginX = panX; panOriginY = panY;
    gv.classList.add('panning');
    e.preventDefault();
  });

  window.addEventListener('mousemove', (e) => {
    if (!isPanning) return;
    panX = panOriginX + (e.clientX - panStartX);
    panY = panOriginY + (e.clientY - panStartY);
    applyStageTransform();
  });

  window.addEventListener('mouseup', () => {
    if (!isPanning) return;
    isPanning = false;
    document.getElementById('gallery-view')?.classList.remove('panning');
  });

  gv.addEventListener('wheel', (e) => {
    e.preventDefault();
    const rect = gv.getBoundingClientRect();
    const mouseX = e.clientX - rect.left;
    const mouseY = e.clientY - rect.top;
    const zoomFactor = e.deltaY < 0 ? 1.1 : 0.91;
    const newScale = Math.min(4, Math.max(0.25, scale * zoomFactor));
    panX = mouseX - (mouseX - panX) * (newScale / scale);
    panY = mouseY - (mouseY - panY) * (newScale / scale);
    scale = newScale;
    applyStageTransform();
  }, { passive: false });

  let lastTouchDist = null;
  gv.addEventListener('touchstart', (e) => {
    if (e.touches.length === 2) {
      lastTouchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    } else if (e.touches.length === 1 && !e.target.closest('.gallery-orb')) {
      isPanning = true;
      panStartX = e.touches[0].clientX; panStartY = e.touches[0].clientY;
      panOriginX = panX; panOriginY = panY;
    }
  }, { passive: true });

  gv.addEventListener('touchmove', (e) => {
    if (e.touches.length === 2 && lastTouchDist) {
      const dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      scale = Math.min(4, Math.max(0.25, scale * (dist / lastTouchDist)));
      lastTouchDist = dist;
      applyStageTransform();
    } else if (e.touches.length === 1 && isPanning) {
      panX = panOriginX + (e.touches[0].clientX - panStartX);
      panY = panOriginY + (e.touches[0].clientY - panStartY);
      applyStageTransform();
    }
  }, { passive: true });

  gv.addEventListener('touchend', () => { isPanning = false; lastTouchDist = null; });
}

function showOrbTooltip(orb, e) {
  const tt = document.getElementById('orb-tooltip');
  let inner = '';
  if (orb.place)   inner += `<div class="tt-place">${orb.place}</div>`;
  if (orb.year)    inner += `<div class="tt-year">born ${orb.year}</div>`;
  if (orb.desc)    inner += `<div class="tt-desc">${orb.desc}</div>`;
  if (!inner)      inner  = '<div class="tt-desc" style="opacity:0.5">no description</div>';
  tt.innerHTML = inner;
  tt.classList.add('visible');
  moveOrbTooltip(e);
}

function moveOrbTooltip(e) {
  const tt = document.getElementById('orb-tooltip');
  let x = e.clientX + 14, y = e.clientY - 10;
  if (x + 240 > window.innerWidth)  x = e.clientX - 240;
  if (y + tt.offsetHeight > window.innerHeight) y = e.clientY - tt.offsetHeight - 10;
  tt.style.left = x + 'px';
  tt.style.top  = y + 'px';
}

function hideOrbTooltip() {
  document.getElementById('orb-tooltip').classList.remove('visible');
}

async function loadAndRenderGallery() {
  document.getElementById('gallery-count').textContent = 'loading…';
  try {
    allOrbs = await fetchOrbs();
  } catch(e) {
    allOrbs = [];
    showToast('could not load memories — check connection');
  }
  panX = 0; panY = 0; scale = 1;
  applyStageTransform();
  applyGalleryFilters();
}

// Auto-navigate to gallery view if URL param is set
(function() {
  const params = new URLSearchParams(window.location.search);
  if (params.get('view') === 'gallery') {
    window.addEventListener('DOMContentLoaded', () => { setTimeout(() => switchView('gallery'), 100); });
  }
})();
